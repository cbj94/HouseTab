databases:
  - name: housetab-db
    databaseName: housetab
    user: housetab
    plan: free

services:
  - type: web
    name: housetab
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "./bin/render-start.sh"
    envVars:
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: housetab-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: BUNDLE_WITHOUT
        value: "development:test"
